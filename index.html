<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>플랩 어드민 v5</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
:root{
  --blue:#1466F5;--blue-dk:#0E52CC;--blue-lt:#EBF1FF;
  --green:#10B981;--yellow:#F59E0B;--red:#EF4444;--purple:#8B5CF6;
  --r:8px;--r-lg:12px;
}
html:not(.dark){
  --ab:#F9FAFB;--as:#FFFFFF;--as2:#F3F4F6;--as3:#E5E7EB;
  --abdr:#E5E7EB;--at:#111827;--am:#6B7280;--abl:#1466F5;
  --ahv:rgba(0,0,0,.04);
}
html.dark{
  --ab:#0F131A;--as:#161D2B;--as2:#1E2840;--as3:#253352;
  --abdr:#263044;--at:#DDE3F0;--am:#6B7FA5;--abl:#4E8EF7;
  --ahv:rgba(255,255,255,.04);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',sans-serif;background:var(--ab);color:var(--at);-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.6;transition:background .18s,color .18s}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--abdr);border-radius:3px}

/* ── LOGIN ── */
#loginWrap{min-height:100vh;display:flex;align-items:center;justify-content:center}
.lbox{background:var(--as);border:1px solid var(--abdr);border-radius:16px;padding:40px 36px;width:380px;max-width:90vw}
.lmark{width:44px;height:44px;border-radius:12px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#fff;margin:0 auto 14px}
.lbox h1{text-align:center;font-size:17px;font-weight:800;color:var(--at);margin-bottom:4px}
.lbox p{text-align:center;font-size:12px;color:var(--am);margin-bottom:24px}
.lerr{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#F87171;padding:8px 12px;border-radius:7px;font-size:12px;margin-bottom:12px;display:none}
.ll{font-size:11px;font-weight:700;color:var(--am);letter-spacing:.04em;display:block;margin-bottom:5px}
.li{width:100%;background:var(--ab);border:1px solid var(--abdr);border-radius:8px;padding:10px 13px;font-size:13.5px;color:var(--at);outline:none;font-family:inherit;transition:border .13s}
.li:focus{border-color:var(--abl)}
.lg{margin-bottom:12px}
.lbtn{width:100%;padding:11px;border-radius:8px;background:var(--blue);color:#fff;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:6px;transition:background .14s}
.lbtn:hover{background:var(--blue-dk)}

/* ── SHELL ── */
#adminWrap{display:none}
#adminWrap.on{display:grid;grid-template-columns:220px 1fr;min-height:100vh}

/* ── SIDEBAR ── */
.aside{background:var(--as);border-right:1px solid var(--abdr);position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column}
.aside::-webkit-scrollbar{width:0}
.a-logo{display:flex;align-items:center;gap:10px;padding:16px 14px;border-bottom:1px solid var(--abdr)}
.a-logo-mark{width:28px;height:28px;border-radius:7px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#fff}
.a-logo-t{font-size:13px;font-weight:800;color:var(--at);line-height:1.2}
.a-logo-s{font-size:10px;color:var(--am)}
.asl{padding:14px 14px 3px;font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--am)}
.anav{padding:0 8px 8px}
.alink{display:flex;align-items:center;gap:8px;padding:7px 10px;margin:1px 0;border-radius:7px;font-size:12.5px;font-weight:500;color:var(--am);cursor:pointer;transition:all .12s;border:none;background:none;width:100%;text-align:left;font-family:inherit}
.alink:hover{background:var(--ahv);color:var(--at)}
.alink.on{background:var(--as2);color:var(--abl);font-weight:700}
.alink-ic{font-size:14px;flex-shrink:0;width:18px;text-align:center}
.aspacer{flex:1}
.abottom{padding:12px;border-top:1px solid var(--abdr)}
.auser{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:background .12s}
.auser:hover{background:var(--ahv)}
.aava{width:28px;height:28px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff}
.auname{font-size:12px;font-weight:600;color:var(--at)}
.auemail{font-size:10px;color:var(--am)}

/* ── MAIN ── */
.main{overflow-y:auto;min-height:100vh;background:var(--ab)}
.mhd{display:flex;align-items:center;justify-content:space-between;padding:18px 28px;border-bottom:1px solid var(--abdr);background:var(--as);position:sticky;top:0;z-index:50}
.mhd-t{font-size:16px;font-weight:800;color:var(--at)}
.mhd-s{font-size:11.5px;color:var(--am);margin-top:1px}
.mbody{padding:28px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;border:none;cursor:pointer;font-size:12.5px;font-weight:700;font-family:inherit;transition:all .13s;white-space:nowrap}
.btn-bl{background:var(--blue);color:#fff}.btn-bl:hover{background:var(--blue-dk)}
.btn-gh{background:var(--as2);color:var(--at);border:1px solid var(--abdr)}.btn-gh:hover{background:var(--as3)}
/* 라이트모드 sidebar border */
html:not(.dark) .aside{border-right:1px solid var(--abdr)}
html:not(.dark) .atbl tr:hover td{background:rgba(0,0,0,.02)}
html:not(.dark) .rte-body{background:var(--as2);position:relative}
.btn-rd{background:rgba(239,68,68,.1);color:#F87171;border:1px solid rgba(239,68,68,.2)}.btn-rd:hover{background:rgba(239,68,68,.18)}
.btn-gr{background:rgba(16,185,129,.1);color:#34D399;border:1px solid rgba(16,185,129,.2)}
.bsm{padding:5px 10px;font-size:11.5px}.bxs{padding:3px 8px;font-size:11px}

/* ── PANEL ── */
.panel{background:var(--as);border:1px solid var(--abdr);border-radius:12px;margin-bottom:16px}
.phd{padding:16px 20px;border-bottom:1px solid var(--abdr);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.phd-t{font-size:13.5px;font-weight:700;color:var(--at)}
.phd-s{font-size:11px;color:var(--am);margin-top:2px}
.pbody{padding:20px}

/* ── FIELDS ── */
.field{margin-bottom:14px}
.fl{font-size:10.5px;font-weight:700;color:var(--am);letter-spacing:.06em;display:block;margin-bottom:5px;text-transform:uppercase}
.fi{width:100%;background:var(--ab);border:1px solid var(--abdr);border-radius:8px;padding:9px 13px;font-size:13.5px;color:var(--at);outline:none;font-family:inherit;transition:border .13s;resize:vertical}
.fi:focus{border-color:var(--abl);box-shadow:0 0 0 3px rgba(20,102,245,.12)}
.fi::placeholder{color:var(--am);opacity:.55}
select.fi{cursor:pointer}
.fhint{font-size:11px;color:var(--am);margin-top:4px}

/* ── TABLE ── */
.atbl{width:100%;border-collapse:collapse}
.atbl th{font-size:11px;font-weight:700;color:var(--am);text-transform:uppercase;letter-spacing:.05em;padding:8px 14px;border-bottom:1px solid var(--abdr);text-align:left}
.atbl td{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.035);font-size:14px;color:var(--at);vertical-align:middle}
.atbl tr:last-child td{border-bottom:none}
.atbl tr:hover td{background:var(--ahv)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:700}
.badge-new{background:rgba(78,142,247,.15);color:#7AB5FA}
.badge-fix{background:rgba(16,185,129,.12);color:#34D399}
.badge-notice{background:rgba(245,158,11,.12);color:#FCD34D}
.badge-pub{background:rgba(16,185,129,.12);color:#34D399}
.badge-dft{background:rgba(156,163,175,.1);color:var(--am)}

/* ── MODAL ── */
.mback{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
.mback.open{display:flex}
.modal{background:var(--as);border:1px solid var(--abdr);border-radius:14px;width:700px;max-width:100%;max-height:92vh;display:flex;flex-direction:column}
.mhdr{padding:18px 24px;border-bottom:1px solid var(--abdr);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mhdr-t{font-size:15px;font-weight:800;color:var(--at)}
.mx{background:none;border:none;color:var(--am);font-size:22px;cursor:pointer;line-height:1;padding:2px}
.mx:hover{color:var(--at)}
.mbdy{padding:24px;overflow-y:auto;flex:1}
.mft{padding:14px 24px;border-bottom:1px solid var(--abdr);border-top:1px solid var(--abdr);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0;background:var(--as)}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;right:24px;z-index:9999;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);border-radius:10px;padding:11px 16px;font-size:13px;color:var(--at);box-shadow:0 8px 32px rgba(0,0,0,.25);transform:translateY(8px);opacity:0;transition:all .22s;pointer-events:none;display:flex;align-items:center;gap:8px;min-width:160px;backdrop-filter:blur(12px)}
#toast.show{transform:translateY(0);opacity:1}
#toast.toast-save{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.25);color:#059669}
html.dark #toast.toast-save{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.3);color:#34d399}
#toast-ic{font-size:15px;flex-shrink:0}
#toast-msg{flex:1}

/* ── SPLIT ── */
.split{display:grid;grid-template-columns:1fr 320px;gap:20px;align-items:start}
@media(max-width:920px){.split{grid-template-columns:1fr}}

/* ── GA4 DASHBOARD ── */
.ga-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.ga-card{background:var(--as);border:1px solid var(--abdr);border-radius:10px;padding:18px;position:relative;overflow:hidden}
.ga-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:10px 10px 0 0}
.ga-card.blue::before{background:var(--blue)}
.ga-card.green::before{background:var(--green)}
.ga-card.yellow::before{background:var(--yellow)}
.ga-card.purple::before{background:var(--purple)}
.ga-val{font-size:26px;font-weight:900;color:var(--at);line-height:1;margin-bottom:4px}
.ga-lbl{font-size:11.5px;color:var(--am);margin-bottom:6px}
.ga-chg{font-size:11px;display:flex;align-items:center;gap:4px}
.ga-chg.up{color:#34D399}.ga-chg.dn{color:#F87171}
.ga-mini{font-size:10px;color:var(--am);margin-top:3px}

/* 차트 바 */
.bar-chart{display:flex;flex-direction:column;gap:8px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-label{font-size:11.5px;color:var(--am);width:140px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;background:var(--as2);border-radius:100px;height:8px;position:relative;overflow:hidden}
.bar-fill{height:100%;border-radius:100px;background:var(--blue);transition:width .6s ease}
.bar-fill.green{background:var(--green)}
.bar-fill.yellow{background:var(--yellow)}
.bar-fill.purple{background:var(--purple)}
.bar-val{font-size:11.5px;color:var(--at);font-weight:600;width:52px;text-align:right;flex-shrink:0}

/* 도넛 차트 (CSS only) */
.donut-wrap{position:relative;width:100px;height:100px;margin:0 auto 12px}
.donut-svg{transform:rotate(-90deg)}
.donut-lbl{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.donut-lbl span{display:block;font-size:18px;font-weight:900;color:var(--at)}
.donut-lbl small{font-size:10px;color:var(--am)}

/* 미니 스파크라인 */
.sparkline{display:flex;align-items:flex-end;gap:3px;height:40px}
.spark-bar{flex:1;background:var(--blue);border-radius:2px 2px 0 0;opacity:.7;min-height:4px;transition:opacity .15s}
.spark-bar:hover{opacity:1}

/* 날짜 레인지 셀렉터 */
.date-range-tabs{display:flex;gap:2px;background:var(--as2);border-radius:8px;padding:3px}
.dr-tab{padding:5px 12px;border-radius:6px;font-size:11.5px;font-weight:600;color:var(--am);cursor:pointer;border:none;background:none;font-family:inherit;transition:all .12s}
.dr-tab.on{background:var(--as);color:var(--abl);box-shadow:0 1px 4px rgba(0,0,0,.2)}

/* 테이블 섹션 */
.data-table{width:100%;border-collapse:collapse}
.data-table th{font-size:10.5px;color:var(--am);text-transform:uppercase;letter-spacing:.05em;padding:7px 10px;border-bottom:1px solid var(--abdr);text-align:left;font-weight:700}
.data-table td{padding:9px 10px;border-bottom:1px solid rgba(255,255,255,.03);font-size:12.5px;color:var(--at);vertical-align:middle}
.data-table tr:last-child td{border-bottom:none}
.rank-num{font-size:11px;color:var(--am);font-weight:700;width:24px}
.prog-cell{display:flex;align-items:center;gap:8px}
.mini-bar{flex:1;height:4px;background:var(--as2);border-radius:2px;overflow:hidden}
.mini-fill{height:100%;background:var(--blue);border-radius:2px}

/* ════════════════════
   RICH TEXT EDITOR
════════════════════ */
.rte-wrap{border:1px solid var(--abdr);border-radius:10px;position:relative;background:var(--ab)}

/* ── 전체화면 에디터 ── */
.editor-fullscreen{position:fixed;inset:0;z-index:2000;background:var(--as);display:flex;flex-direction:column;overflow:hidden}
.editor-fullscreen .rte-wrap{border:none;border-radius:0;flex:1;display:flex;flex-direction:column;overflow-y:auto;position:relative;background:var(--as)}
.editor-fullscreen .rte-toolbar{position:sticky;top:0;z-index:10;border-radius:0}
.editor-fullscreen .rte-body{flex:none;min-height:calc(100vh - 120px);max-width:780px;margin:0 auto;width:100%}
.editor-fullscreen-hd{display:flex;align-items:center;gap:10px;padding:10px 20px;border-bottom:1px solid var(--abdr);background:var(--as);flex-shrink:0}
.editor-fullscreen-hd input{flex:1;font-size:18px;font-weight:700;color:var(--at);background:transparent;border:none;outline:none;font-family:inherit}

/* ── 콜아웃 블록 ── */
.rte-body .callout{border-radius:4px;padding:14px 16px;margin:4px 0 8px;display:flex;gap:10px;align-items:flex-start;border:none;position:relative}
.rte-body .callout:hover .callout-color-btn{opacity:.6!important}
.rte-body .callout .callout-color-btn:hover{opacity:1!important}
/* ── 이미지 링크 카드 ── */
.rte-body .img-link-card,.abody .img-link-card{display:flex;border:1px solid var(--abdr,#e5e7eb);border-radius:8px;overflow:hidden;margin:10px 0;cursor:pointer;text-decoration:none;color:inherit;transition:box-shadow .15s;max-height:130px}
.rte-body .img-link-card:hover,.abody .img-link-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.12)}
.img-link-card-img{width:130px;min-height:90px;object-fit:cover;flex-shrink:0;background:#f3f4f6}
.img-link-card-body{flex:1;padding:12px 14px;display:flex;flex-direction:column;justify-content:center;min-width:0}
.img-link-card-title{font-size:14px;font-weight:600;color:var(--at,#111);margin-bottom:3px;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.img-link-card-desc{font-size:12px;color:var(--am,#888);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.img-link-card-url{font-size:11px;color:#9ca3af;margin-top:5px;display:flex;align-items:center;gap:4px}
.img-link-card-url::before{content:'🔗';font-size:10px}
/* ── 프론트엔드 콜아웃 스타일 ── */
.abody .callout{border-radius:4px;padding:14px 16px;margin:4px 0 8px;display:flex;gap:10px;align-items:flex-start;border:none}
.abody .callout-icon{font-size:18px;flex-shrink:0;line-height:1.6;width:24px;text-align:center}
.abody .callout-text{flex:1;min-width:0}
.abody .callout-text p{margin:0;font-size:14px;line-height:1.75}
.abody .callout .callout-color-btn{display:none}
/* ── 프론트엔드 콘텐츠 스타일 (어드민 작성 스타일 유지) ── */
.abody h1{font-size:24px;font-weight:800;margin:16px 0 8px}
.abody h2{font-size:19px;font-weight:700;margin:14px 0 6px}
.abody h3{font-size:16px;font-weight:700;margin:12px 0 5px}
.abody p{margin:4px 0}
.abody table{width:100%;border-collapse:collapse;margin:8px 0}
.abody td,.abody th{border:1px solid #e5e7eb;padding:8px 10px;font-size:13px}
.abody th{font-weight:600;background:#f3f4f6}
.abody blockquote{border-left:3px solid #3b82f6;padding:8px 16px;margin:8px 0;color:#6b7280;background:#f9fafb}
.abody pre{background:#1e293b;color:#e2e8f0;padding:16px;border-radius:8px;overflow-x:auto;font-size:13px}
.abody ul{list-style:disc;padding-left:24px;margin:4px 0}
.abody ol{list-style:decimal;padding-left:24px;margin:4px 0}
.abody li{margin:2px 0;font-size:14px;line-height:1.75}
.abody img{max-width:100%;border-radius:6px;margin:8px 0}
html.dark .abody td,html.dark .abody th{border-color:var(--bdr)}
html.dark .abody th{background:var(--card)}
html.dark .abody blockquote{background:var(--card);color:var(--muted);border-color:var(--blue)}
.rte-body .callout-icon{font-size:18px;flex-shrink:0;line-height:1.6;width:24px;text-align:center;cursor:pointer;border-radius:3px;user-select:none}
.rte-body .callout-icon:hover{background:rgba(55,53,47,.08)}
.rte-body .callout-text{flex:1;min-width:0;outline:none}
.rte-body .callout-text p{margin:0;font-size:14px;line-height:1.75;color:var(--at,#37352f)}
/* ── 서비스 페이지 미리보기 (홈페이지 동일 렌더링) ── */
.rte-body .sp-hero{text-align:center;padding:32px 20px 24px;border-bottom:1px solid var(--abdr);margin:-32px -40px 0;background:var(--as)}
.rte-body .sp-hero-icon{font-size:48px;margin-bottom:12px;line-height:1}
.rte-body .sp-title{font-size:24px;font-weight:800;color:var(--at);letter-spacing:-.02em;margin-bottom:8px}
.rte-body .sp-lead{font-size:14.5px;color:var(--am);line-height:1.6;max-width:360px;margin:0 auto}
.rte-body .sp-section{padding:24px 0;border-bottom:1px solid var(--abdr)}
.rte-body .sp-section:last-child{border-bottom:none}
.rte-body .sp-section h2{font-size:17px;font-weight:700;color:var(--at);margin-bottom:10px;letter-spacing:-.01em}
.rte-body .sp-section p{font-size:14px;color:var(--am);line-height:1.7;margin-bottom:12px}
.rte-body .sp-section p:last-child{margin-bottom:0}
.rte-body .sp-card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
.rte-body .sp-card{background:var(--as2);border-radius:14px;padding:16px;text-align:center}
.rte-body .sp-card-icon{font-size:28px;margin-bottom:8px}
.rte-body .sp-card-title{font-size:13px;font-weight:700;color:var(--at);margin-bottom:4px}
.rte-body .sp-card-desc{font-size:12px;color:var(--am);line-height:1.5}
.rte-body .sp-steps{display:flex;flex-direction:column;gap:12px;margin-top:12px}
.rte-body .sp-step{display:flex;gap:14px;align-items:flex-start}
.rte-body .sp-step-num{width:28px;height:28px;min-width:28px;border-radius:50%;background:var(--abl);color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px}
.rte-body .sp-step strong{font-size:14px;color:var(--at);display:block;margin-bottom:3px}
.rte-body .sp-step p{font-size:13px;color:var(--am);line-height:1.6;margin:0}

/* ── 에디터 개선 ── */
.rte-body img{max-width:100%;border-radius:8px;margin:8px 0;display:block;cursor:pointer}
.rte-body video{max-width:100%;border-radius:10px;margin:8px 0;display:block}

<script>
(async function(){
  try{
    const FB = {
      apiKey:            "AIzaSyB3tPHPnv961f2PhxVEZb_g2g6mdKxVbsQ",
      authDomain:        "plabstadiumguide.firebaseapp.com",
      projectId:         "plabstadiumguide",

      messagingSenderId: "347837323084",
      appId:             "1:347837323084:web:09d157b9b705f5f5d721e9"
    };

    const {initializeApp}        = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    const {getFirestore,doc,setDoc,getDoc,enableIndexedDbPersistence} = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const {getStorage,ref,uploadString,getDownloadURL} = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js');

    const app     = initializeApp(FB);
    const db      = getFirestore(app);
    const storage = getStorage(app);
    const REF     = ()=>doc(db,'plab','siteData');

    enableIndexedDbPersistence(db).catch(e=>{
      if(e.code!=='failed-precondition'&&e.code!=='unimplemented')
        console.warn('Firestore persistence 오류',e);
    });

    async function withRetry(fn,maxTry=4,baseMs=800){
      for(let i=0;i<maxTry;i++){
        try{return await fn();}
        catch(e){
          if(i===maxTry-1)throw e;
          await new Promise(r=>setTimeout(r,baseMs*(1<<i)));
        }
      }
    }

    /* ── 이미지 Storage 업로드 ── */
    window._fbUploadImage=async(dataUrl,path)=>{
      const timeout=new Promise((_,rej)=>setTimeout(()=>rej(new Error('upload timeout')),20000));
      try{
        return await Promise.race([
          withRetry(async()=>{
            const r=ref(storage,path);
            await uploadString(r,dataUrl,'data_url');
            return await getDownloadURL(r);
          },2,500),
          timeout
        ]);
      }catch(e){
        console.error('🔴 이미지 업로드 오류 상세:', e.code, e.message, e);
        const code=e.code||''; const msg=e.message||'';
        let reason='';
        if(msg.includes('upload timeout')){
          reason='이미지 업로드 시간 초과 (20초)\n→ 이미지 파일 크기를 줄이거나 네트워크를 확인해 주세요.';
        } else if(code.includes('unauthorized')||code.includes('permission')||msg.includes('403')||msg.includes('unauthorized')){
          reason='Firebase Storage 권한 오류\n→ Firebase Console → Storage → Rules에서 allow write: if true; 로 변경해 주세요.';
        } else if(code.includes('quota')||msg.includes('quota')){
          reason='Firebase Storage 용량 한도 초과\n→ Firebase Console에서 Storage 사용량을 확인해 주세요.';
        } else if(!navigator.onLine){
          reason='인터넷 연결이 없습니다.\n→ 네트워크 연결 후 다시 시도해 주세요.';
        } else {
          reason='이미지 업로드 실패\n오류: '+(msg||code||'알 수 없는 오류')+(msg||code||'알 수 없는 오류');
        }
        window._lastImgUploadError=reason;
        return null;
      }
    };

    /* ── Firestore 저장 ── */
    let _pendingSave=null;
    const _rawSave=async(json)=>{
      await withRetry(()=>setDoc(REF(),{data:json,savedAt:new Date().toISOString()}));
    };
    window._fbSave=async(json)=>{
      if(!navigator.onLine){_pendingSave=json;window._lastSaveError='오프라인 상태입니다.';return false;}
      try{await _rawSave(json);_pendingSave=null;window._lastSaveError='';return true;}
      catch(e){
        console.error('Firebase 저장 오류',e);
        _pendingSave=json;
        const code=e.code||''; const msg=e.message||'';
        if(code.includes('permission')||msg.includes('Missing or insufficient permissions')){
          window._lastSaveError='Firebase 권한 오류\n→ Firestore Rules에서 write 권한을 확인해 주세요.';
        } else if(msg.includes('exceed')||msg.includes('maximum')){
          window._lastSaveError='저장 데이터 초과 (Firestore 1MB 한도)\n→ 이미지를 Storage에 업로드 후 저장하세요.';
        } else {
          window._lastSaveError='저장 실패: '+(msg||code||'알 수 없는 오류');
        }
        return false;
      }
    };

    /* ── Firestore 로드 ── */
    window._fbLoad=async()=>{
      try{
        const snap=await withRetry(()=>getDoc(REF()));
        return snap.exists()?snap.data().data:null;
      }catch(e){console.error('Firebase 로드 오류',e);return null;}
    };

    /* ── 온라인 복귀 시 재저장 ── */
    window.addEventListener('online',async()=>{
      if(window._fbBarSet)window._fbBarSet('load');
      if(_pendingSave){
        const ok=await window._fbSave(_pendingSave);
        if(window._fbBarSet)window._fbBarSet(ok?'ok':'err');
      }else{
        if(window._fbBarSet)window._fbBarSet('live');
      }
    });
    window.addEventListener('offline',()=>{
      if(window._fbBarSet)window._fbBarSet('err');
    });

    console.log('✅ Firebase 초기화 완료');

  }catch(err){
    console.error('Firebase 초기화 실패',err);
    window._fbSave=async()=>false;
    window._fbLoad=async()=>null;
  }
})();
</script>

function initAdminTheme(){
  const t=localStorage.getItem('plab_admin_theme')||'light';
  if(t==='light'){document.documentElement.classList.remove('dark');}
  else{document.documentElement.classList.add('dark');}
  _syncThemeBtn();
}
function toggleAdminTheme(){
  const isDark=document.documentElement.classList.contains('dark');
  if(isDark){
    document.documentElement.classList.remove('dark');
    localStorage.setItem('plab_admin_theme','light');
  } else {
    document.documentElement.classList.add('dark');
    localStorage.setItem('plab_admin_theme','dark');
  }
  _syncThemeBtn();
}
function _syncThemeBtn(){
  const isDark=document.documentElement.classList.contains('dark');
  const btn=document.getElementById('adminThemeBtn');
  const knob=document.getElementById('adminThemeKnob');
  if(btn){btn.style.background=isDark?'var(--blue)':'var(--abdr)';}
  if(knob){knob.style.transform=isDark?'translateX(16px)':'translateX(0)';}
}
initAdminTheme();

    // [소그룹: 매치 추가 및 취소]
    {id:'p1d',title:"매치 추가·취소 신규 정책 안내('26.1)",subCat:'매치 추가 및 취소',subCnt:4,excerpt:"2026년 1월 변경된 매치 추가·취소 규정을 확인하세요.",content:`<h2>매치 추가·취소 신규 정책</h2>

    {id:'p1e',title:'비·눈 오는 날 매치 진행 여부 설정',subCat:'매치 추가 및 취소',subCnt:4,excerpt:'날씨 악화 시 매치 진행 여부를 참가자에게 사전 안내하는 방법입니다.',content:`<h2>날씨 대응 매치 설정</h2>
<p>구장관리 사이트에서 악천후 시 매치 진행 여부를 설정하면 참가자에게 자동으로 알림이 발송됩니다.</p>

    // [소그룹: 매치 운영]
    {id:'p1f',title:'레벨 시스템 안내',subCat:'매치 운영',subCnt:6,excerpt:'플랩풋볼 레벨 산정 기준과 매치 참여 조건을 설명합니다.',content:`<h2>레벨 시스템</h2>

<tr><td>5~6</td><td>세미프로</td><td>팀 플레이 가능한 분</td></tr>

</table>
<h3>레벨 산정 기준</h3>
<ul>
<li>매치 참가 횟수</li>

<li>포지션 및 플레이 스타일 설문</li>
</ul>`,category:'gc1',author:'플랩팀',emoji:'📊',status:'published',date:new Date(Date.now()-180000000).toISOString(),views:834},
    {id:'p1g',title:'매치 결과 및 통계 확인',subCat:'매치 운영',subCnt:6,excerpt:'매치 결과 기록과 구장별 통계를 확인하는 방법을 안내합니다.',content:`<h2>매치 결과 확인</h2>

    {id:'p1h',title:'매치 공지 및 안내 메시지 발송',subCat:'매치 운영',subCnt:6,excerpt:'매치 참가자에게 공지 및 안내 메시지를 보내는 방법입니다.',content:`<h2>공지 메시지 발송</h2>

    {id:'p2b',title:'계정 정보 수정 및 권한 관리',subCat:'시작하기',subCnt:4,excerpt:'관리자 계정 정보와 직원 접근 권한을 설정하는 방법입니다.',content:`<h2>계정 및 권한 관리</h2>

    // [소그룹: 일정 관리]
    {id:'p2c',title:'매치 일정 등록 및 관리',subCat:'일정 관리',subCnt:3,excerpt:'구장 매치 일정을 등록하고 관리하는 방법을 안내합니다.',content:`<h2>매치 일정 관리</h2>

    {id:'p2d',title:'구장 정기 휴무 및 임시 휴무 설정',subCat:'일정 관리',subCnt:3,excerpt:'정기 휴무와 임시 휴무를 설정하여 매치 자동 등록을 중단하세요.',content:`<h2>휴무 설정</h2>

    {id:'p3a',title:'런드리 서비스 소개',subCat:'서비스 소개',subCnt:3,excerpt:'플랩 런드리 서비스의 개요와 신청 방법을 안내합니다.',content:`<h2>런드리 서비스란?</h2>

    {id:'p3b',title:'런드리 서비스 이용 방법',subCat:'서비스 소개',subCnt:3,excerpt:'유니폼 및 용품 세탁 서비스 신청 전체 과정을 안내합니다.',content:`<h2>런드리 신청 방법</h2>

    {id:'p3d',title:'수거·반납 일정 확인',subCat:'이용 현황',subCnt:2,excerpt:'런드리 수거 및 반납 일정을 확인하고 관리하는 방법입니다.',content:`<h2>수거·반납 일정</h2>

    // ═══════════════════════════════

    // [소그룹: 공통 FAQ]
    {id:'p6a',title:'파트너 자주 묻는 질문 모음',subCat:'공통 FAQ',subCnt:6,excerpt:'파트너 운영 중 자주 발생하는 질문과 답변을 정리했습니다.',content:`<h2>자주 묻는 질문</h2>
<h3>Q. 매치 참가자 수를 임의로 변경할 수 있나요?</h3>
<p>A. 매치 등록 후 24시간 이내, 그리고 참가자가 없는 경우에 한해 구장관리 사이트에서 변경 가능합니다.</p>
<h3>Q. 환불 처리는 얼마나 걸리나요?</h3>
<p>A. 결제 수단에 따라 다르며, 통상 영업일 기준 3~5일 소요됩니다.</p>
<h3>Q. 구장관리 사이트 비밀번호를 잊었을 때는?</h3>
<p>A. 로그인 화면에서 [비밀번호 찾기]를 클릭하고 가입 이메일로 재설정 링크를 받으세요.</p>
<h3>Q. 정산 계좌를 변경하고 싶어요.</h3>
<p>A. 구장관리 사이트 [설정 > 정산 계좌]에서 직접 변경 가능합니다. 변경 후 다음 정산부터 적용됩니다.</p>`,category:'gc6',author:'플랩팀',emoji:'❓',status:'published',date:new Date(Date.now()-500000000).toISOString(),views:1567},
    {id:'p6b',title:'소셜매치 관련 자주 묻는 질문',subCat:'소셜매치 FAQ',subCnt:4,excerpt:'소셜매치 운영 시 자주 발생하는 질문을 모았습니다.',content:`<h2>소셜매치 FAQ</h2>
<h3>Q. 우천 시 매치는 어떻게 되나요?</h3>
<p>A. 우천 취소 시 참가자 전원 전액 환불 처리되며, 카카오톡으로 개별 안내됩니다. 구장관리 사이트에서 취소 처리를 직접 진행해주세요.</p>
<h3>Q. 매치 당일 참가자가 오지 않으면?</h3>
<p>A. 노쇼 참가자는 플랩 정책에 따라 페널티가 부과됩니다. 구장에서 별도로 조치를 취할 필요는 없습니다.</p>
<h3>Q. 레벨 제한을 설정할 수 있나요?</h3>
<p>A. 네, 매치 등록 시 [레벨 제한] 항목에서 참가 가능 레벨 범위를 설정할 수 있습니다.</p>`,category:'gc6',author:'플랩팀',emoji:'⚽',status:'published',date:new Date(Date.now()-520000000).toISOString(),views:834},
    {id:'p6c',title:'정산 및 세금 관련 FAQ',subCat:'정산 FAQ',subCnt:3,excerpt:'정산 및 세금계산서 관련 자주 묻는 질문입니다.',content:`<h2>정산·세금 FAQ</h2>
<h3>Q. 사업자 등록 전에도 정산이 가능한가요?</h3>
<p>A. 사업자 등록 후에만 정산이 가능합니다. 개인사업자 또는 법인사업자 모두 가능합니다.</p>
<h3>Q. 세금계산서 발행이 안 될 때는?</h3>
<p>A. 사업자 정보(상호명, 사업자번호, 대표자명)가 정확히 입력되어야 합니다. [설정 > 사업자 정보]에서 확인해주세요.</p>
<h3>Q. 면세 사업자인데 세금계산서 발행이 가능한가요?</h3>
<p>A. 면세 사업자의 경우 계산서(세금계산서 아님)가 발행됩니다. 별도 문의가 필요한 경우 카카오톡 채널로 연락해주세요.</p>`,category:'gc6',author:'플랩팀',emoji:'💳',status:'published',date:new Date(Date.now()-540000000).toISOString(),views:456},

/* ── 이미지 업로드 헬퍼: base64 → Firebase Storage URL ── */
async function compressImage(base64DataUrl, maxWidth=1200, quality=0.82){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=function(){
      let w=img.width, h=img.height;
      if(w>maxWidth){h=Math.round(h*maxWidth/w);w=maxWidth;}
      const canvas=document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      const ctx=canvas.getContext('2d');
      // PNG(투명 배경 포함 가능)는 흰 배경 채우지 않고 PNG로 유지
      const isPng=base64DataUrl.startsWith('data:image/png');
      if(!isPng){
        // JPEG는 투명 없으므로 흰 배경 필요 없음
        ctx.drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg',quality));
      } else {
        // PNG: 투명도 보존 → PNG로 출력
        ctx.drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/png'));
      }
    };
    img.onerror=()=>resolve(base64DataUrl); // 실패 시 원본 반환
    img.src=base64DataUrl;
  });
}

async function uploadImg(base64DataUrl, folder='images'){
  if(!base64DataUrl||!base64DataUrl.startsWith('data:')) return base64DataUrl;
  if(!window._fbUploadImage){
    return base64DataUrl;
  }
  // 업로드 전 자동 압축 (1200px 이하, JPG 82%)
  let dataUrl=base64DataUrl;
  try{
    const sizeKB=Math.round(base64DataUrl.length*0.75/1024);
    if(sizeKB>200){ // 200KB 이상이면 압축
      dataUrl=await compressImage(base64DataUrl,1200,0.82);
      const newKB=Math.round(dataUrl.length*0.75/1024);
      console.log(`이미지 압축: ${sizeKB}KB → ${newKB}KB`);
    }
  }catch(e){console.warn('압축 실패, 원본 사용',e);}
  const ext='jpeg';
  const path=`${folder}/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
  const url=await window._fbUploadImage(dataUrl,path);
  return url||dataUrl;
}

/* ── RTE 본문 내 base64 이미지 → Storage URL 일괄 변환 ── */
async function uploadRteImages(html){
  const parser=new DOMParser();
  const doc2=parser.parseFromString(html,'text/html');
  const imgs=[...doc2.querySelectorAll('img[src^="data:"]')];
  const vids=[...doc2.querySelectorAll('video[src^="data:"]')];
  let uploadFailReason='';
  let uploadSuccess=0, uploadFail=0;
  /* 이미지 업로드 */
  await Promise.all(imgs.map(async img=>{
    window._lastImgUploadError='';
    const originalSrc=img.src;
    const url=await uploadImg(originalSrc,'posts');
    if(url&&!url.startsWith('data:')){
      img.src=url;
      uploadSuccess++;
    } else {
      img.src=originalSrc;
      if(window._lastImgUploadError) uploadFailReason=window._lastImgUploadError;
      uploadFail++;
    }
  }));
  /* 동영상 업로드 */
  await Promise.all(vids.map(async vid=>{
    window._lastImgUploadError='';
    const originalSrc=vid.src;
    const url=await uploadImg(originalSrc,'videos');
    if(url&&!url.startsWith('data:')){
      vid.src=url;
      uploadSuccess++;
    } else {
      vid.src=originalSrc;
      if(window._lastImgUploadError) uploadFailReason=window._lastImgUploadError;
      uploadFail++;
    }
  }));
  if(uploadFail>0){
    const reason=uploadFailReason||'미디어를 Firebase Storage에 업로드하지 못했습니다.';
    window._pendingImgFailReason=reason;
    window._imgUploadStats={success:uploadSuccess,fail:uploadFail};
  }
  return doc2.body.innerHTML;
}


function _fbBarSet(state){
  const bar=document.getElementById('fbBar');
  const txt=document.getElementById('fbBarTxt');
  if(!bar||!txt)return;
  const cfg={
    ok:  {bg:'rgba(16,185,129,.1)', color:'#10B981', ic:'✅', msg:'클라우드에 저장됨'},
    err: {bg:'rgba(239,68,68,.1)',  color:'#F87171', ic:'❌', msg:'저장 실패 (로컬만)'},
    load:{bg:'rgba(245,158,11,.08)',color:'#F59E0B', ic:'⏳', msg:'클라우드 연결 중...'},
    live:{bg:'rgba(16,185,129,.1)', color:'#10B981', ic:'☁️', msg:'클라우드 연결됨'},
    none:{bg:'rgba(99,102,241,.1)', color:'#818CF8', ic:'💾', msg:'로컬 저장 (Firebase 미설정)'},
  }[state]||{};
  bar.style.background=cfg.bg;bar.style.color=cfg.color;
  bar.firstElementChild.textContent=cfg.ic;txt.textContent=cfg.msg;
}

/* ── 시작 시 Firebase 데이터 로드 ── */
async function _fbStartLoad(){
  // Firebase 초기화 대기 (최대 5초)
  if(!window._fbLoad){
    _fbBarSet('load');
    let waited=0;
    while(!window._fbLoad && waited<5000){
      await new Promise(r=>setTimeout(r,100));
      waited+=100;
    }
  }
  if(!window._fbLoad){_fbBarSet('none');return;}
  _fbBarSet('load');
  const json=await window._fbLoad();
  if(!json){_fbBarSet('live');return;}
  try{
    const parsed=JSON.parse(json);
    /* DEF와 병합 */
    S={
      ...JSON.parse(JSON.stringify(DEF)),
      ...parsed,
      settings:{...JSON.parse(JSON.stringify(DEF)).settings,...(parsed.settings||{}),
        footer:{...JSON.parse(JSON.stringify(DEF)).settings.footer,...((parsed.settings||{}).footer||{})}},
      subcategories:{...JSON.parse(JSON.stringify(DEF)).subcategories,...(parsed.subcategories||{})},
      servicePages:{...JSON.parse(JSON.stringify(DEF)).servicePages,...(parsed.servicePages||{})},
      postOrder:{...(parsed.postOrder||{})}
    };
    localStorage.setItem('plab_v5',json); /* 로컬도 갱신 */
    _fbBarSet('live');
    /* 현재 보이는 화면 새로고침 */
    const cur=document.querySelector('.alink.on');
    if(cur)cur.click();
  }catch(e){_fbBarSet('none');console.warn('Firebase 데이터 파싱 실패',e);}
}

function processGalFiles(files){
  Array.from(files).forEach(f=>{

    const r=new FileReader();
    r.onload=(e)=>{_galleryImages.push(e.target.result);document.getElementById('galPreview').innerHTML=renderGalPreview();};
    r.readAsDataURL(f);
  });
}

let _editUpdId=null;
async function editUpd(id){openUpdModal(id);}
async function saveUpd(id){
  const _prevU=id?S.updates.find(x=>x.id===id):null;
  // 배너 이미지: base64이면 Storage 업로드
  let _bannerImg=_bnrImgData==='__clear__'?null:(_bnrImgData||_prevU?.bannerImage||null);
  if(_bannerImg&&_bannerImg.startsWith('data:')){
    toast('이미지 업로드 중…');
    _bannerImg=await uploadImg(_bannerImg,'banners');
  }
  // 갤러리: base64이면 Storage 업로드
  const uploadedGallery=await Promise.all(_galleryImages.map(img=>
    img&&img.startsWith('data:')?uploadImg(img,'gallery'):Promise.resolve(img)
  ));
  // 에디터 id가 rteBody이므로 rteBody에서 읽음
  const bodyEl=document.getElementById('rteBody')||document.getElementById('uBody');
  // 본문 내 base64 이미지 업로드
  const content=await uploadRteImages(bodyEl?.innerHTML||'');
  const d={
    id:id||'u'+Date.now(),
    type:document.getElementById('uT')?.value||'new',
    title:(document.getElementById('uTitle')||document.getElementById('uTi'))?.value.trim()||'',
    dateISO:document.getElementById('uD')?.value||'',
    date:(()=>{const v=document.getElementById('uD')?.value||'';if(!v)return '';const [y,m]=v.split('-');return `'${String(y).slice(2)}.${Number(m)}`;})(),
    subtitle:document.getElementById('uSub')?.value.trim()||'',
    articleId:document.getElementById('uArt')?.value||'',
    content,
    body:bodyEl?.innerText||'',
    gallery:uploadedGallery.filter(Boolean),
    bannerImage:_bannerImg,
    showInBanner:_prevU?.showInBanner??false,
  };
  if(!d.title){toast('⚠️ 제목을 입력하세요');return;}
  if(id){const i=S.updates.findIndex(x=>x.id===id);if(i>=0)S.updates[i]=d;else S.updates.push(d);}
  else S.updates.push(d);
  await save();
  _editorDirty=false;
  saveConfirm('업데이트 소식이 저장됐습니다', ()=>rBanner());
}
function delUpd(id){if(!confirm('삭제하시겠습니까?'))return;S.updates=S.updates.filter(x=>x.id!==id);save();rBanner();toast('삭제됨');}

var _utNextIdx=100;
function addUpdateTypeRow(){
  const i=_utNextIdx++;
  const row=document.createElement('div');
  row.id='utRow'+i;
  row.style.cssText='display:flex;gap:6px;align-items:center;margin-bottom:6px';
  row.innerHTML=`<input class="fi" id="utId${i}" value="" style="width:70px;font-size:12px" placeholder="ID (영문)">
    <input class="fi" id="utLabel${i}" value="" style="flex:1;font-size:12px" placeholder="표시 라벨">
    <input class="fi" id="utBadge${i}" value="" style="width:60px;font-size:12px" placeholder="배지">
    <button class="ios-btn-sm ios-btn-red" onclick="this.parentElement.remove()">✕</button>`;
  document.getElementById('utList').appendChild(row);
}
function saveUpdateTypes(){
  const rows=document.querySelectorAll('#utList > div');
  const types=[];
  rows.forEach(row=>{
    const idEl=row.querySelector('input:nth-child(1)');
    const labelEl=row.querySelector('input:nth-child(2)');
    const badgeEl=row.querySelector('input:nth-child(3)');
    if(idEl&&labelEl&&idEl.value.trim()){
      types.push({id:idEl.value.trim(),label:labelEl.value.trim(),badge:badgeEl?.value.trim()||idEl.value.trim()});
    }
  });
  if(!types.length){toast('⚠️ 최소 1개의 유형이 필요합니다');return;}
  S.updateTypes=types;
  save();closeModal();toast('✓ 유형이 저장되었습니다');
}

/* ── 드래그앤드롭 순서 변경 ── */
/* ── 배열 아이템 이동 헬퍼 (splice 올바른 버전) ── */
/* ── 카테고리 커스텀 드래그 (pointer 이벤트, HTML5 drag API 미사용) ── */

function moveItem(arr, fromIdx, toIdx, insertBefore){
  if(fromIdx===toIdx)return;
  const item=arr.splice(fromIdx,1)[0];
  // splice 후 toIdx 보정: fromIdx가 toIdx보다 앞이면 toIdx가 1 줄어듦
  let dest=toIdx;
  if(fromIdx<toIdx) dest=toIdx-1;
  if(insertBefore) arr.splice(dest,0,item);
  else arr.splice(dest+1,0,item);
}

let _dragType=null, _dragId=null, _dragCat=null, _dragSub=null;

function dragStart(e, type, id, cat, sub){
  _dragType=type; _dragId=id; _dragCat=cat||null; _dragSub=sub||null;
  e.dataTransfer.effectAllowed='move';
  setTimeout(()=>e.target.closest('[draggable]')?.classList.add('dragging-item'),0);
}
function dragEnd(e){
  e.target.closest('[draggable]')?.classList.remove('dragging-item');
  document.querySelectorAll('.drag-over-top,.drag-over-bot').forEach(el=>{
    el.classList.remove('drag-over-top','drag-over-bot');
  });
}
function initCatListDrag(listEl){
  // cat-card에 직접 이벤트 있으므로 불필요
}

function dragOver(e, type, targetId){
  if(_dragType!==type){
    if(_dragType)e.preventDefault();
    return;
  }
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  const el=e.currentTarget;
  const rect=el.getBoundingClientRect();
  const isTop=(e.clientY-rect.top)<(rect.height/2);
  document.querySelectorAll('.drag-over-top,.drag-over-bot').forEach(x=>{
    if(x!==el){x.classList.remove('drag-over-top','drag-over-bot');}
  });
  el.classList.toggle('drag-over-top',isTop);
  el.classList.toggle('drag-over-bot',!isTop);
  // cat 드래그 중에는 catList로 bubble 허용 (stopPropagation 제거)
  if(_dragType!=='cat') e.stopPropagation();
}
function dragLeave(e){
  // 자식 요소로 이동 시 무시
  if(e.currentTarget.contains(e.relatedTarget))return;
  e.currentTarget.classList.remove('drag-over-top','drag-over-bot');
}
function dragDrop(e, type, targetId, targetCat, targetSub){
  e.preventDefault(); e.stopPropagation();
  const el=e.currentTarget;
  const isTop=el.classList.contains('drag-over-top');
  el.classList.remove('drag-over-top','drag-over-bot');

  if(type==='cat'&&_dragType==='cat'&&_dragId!==targetId){
    // 카테고리 순서 변경
    const arr=[...S.categories].sort((a,b)=>(a.order??0)-(b.order??0));
    const fromIdx=arr.findIndex(c=>c.id===_dragId);
    const toIdx=arr.findIndex(c=>c.id===targetId);
    if(fromIdx<0||toIdx<0)return;
    moveItem(arr,fromIdx,toIdx,isTop);
    arr.forEach((c,i)=>c.order=i);
    S.categories=arr;
    save();rPostsFiltered('guide');
  } else if(type==='sub'&&_dragType==='sub'){
    // 서브카테고리 순서 변경 (같은 카테고리 내)
    const [dragCat,dragSub64]=_dragId.split('__');
    const [tgtCat,tgtSub64]=targetId.split('__');
    if(dragCat!==tgtCat||dragSub64===tgtSub64)return;
    const dragSub=decodeURIComponent(escape(atob(dragSub64)));
    const tgtSub=decodeURIComponent(escape(atob(tgtSub64)));
    if(!S.subcategories)S.subcategories={};
    if(!S.subcategories[dragCat]){
      S.subcategories[dragCat]=[...new Set(S.posts.filter(p=>p.category===dragCat&&p.subCat).map(p=>p.subCat))];
    }
    const arr=S.subcategories[dragCat];
    const fromIdx=arr.indexOf(dragSub);
    const toIdx=arr.indexOf(tgtSub);
    if(fromIdx<0||toIdx<0)return;
    moveItem(arr,fromIdx,toIdx,isTop);
    save();rPostsFiltered('guide');
  } else if(type==='post'&&_dragType==='post'){
    // 게시글 순서 변경 (같은 서브카테고리 내)
    if(_dragCat!==targetCat||_dragSub!==targetSub||_dragId===targetId)return;
    if(!S.postOrder)S.postOrder={};
    const orderKey=targetCat+'__'+targetSub;
    const subPosts=S.posts.filter(p=>p.category===targetCat&&(p.subCat||'기타')===targetSub);
    let order=S.postOrder[orderKey]||subPosts.map(p=>p.id);
    subPosts.forEach(p=>{if(!order.includes(p.id))order.push(p.id);});
    const fromIdx=order.indexOf(_dragId);
    const toIdx=order.indexOf(targetId);
    if(fromIdx<0||toIdx<0)return;
    moveItem(order,fromIdx,toIdx,isTop);
    S.postOrder[orderKey]=order;
    save();rPostsFiltered('guide');
  } else if(type==='svcpost'&&_dragType==='svcpost'){
    // 서비스 게시글 순서 변경
    if(!S.postOrder)S.postOrder={};
    const orderKey='__svc__';
    const svcPosts=S.posts.filter(p=>p.postType==='service');
    let order=S.postOrder[orderKey]||svcPosts.map(p=>p.id);
    svcPosts.forEach(p=>{if(!order.includes(p.id))order.push(p.id);});
    const fromIdx=order.indexOf(_dragId);
    const toIdx=order.indexOf(targetId);
    if(fromIdx>=0&&toIdx>=0&&fromIdx!==toIdx){
      const dropIsTop=el.classList.contains('drag-over-top');
      moveItem(order,fromIdx,toIdx,dropIsTop);
      S.postOrder[orderKey]=order;
      save();rPostsFiltered('service');
    }
  }
  _dragType=null;_dragId=null;_dragCat=null;_dragSub=null;
}

/* ── 카테고리 드래그 (mousedown/mousemove/mouseup) ── */
function initCatMouseDrag(listEl){
  if(!listEl||listEl._catDragBound)return;
  listEl._catDragBound=true;
  listEl.addEventListener('mousedown',function(e){
    var grip=e.target.closest('.cat-grip');
    if(!grip)return;
    e.preventDefault();e.stopPropagation();
    var card=grip.closest('.cat-card');if(!card)return;
    var fromId=card.dataset.catid;
    var bestCard=null,bestIsTop=true,moved=false,startY=e.clientY;
    var line=document.createElement('div');
    line.style.cssText='position:fixed;height:3px;background:#2563eb;border-radius:2px;pointer-events:none;z-index:9999;display:none';
    document.body.appendChild(line);
    var ghost=document.createElement('div');
    ghost.style.cssText='position:fixed;z-index:9998;pointer-events:none;background:#fff;border:2px solid #2563eb;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.18);opacity:0;padding:10px 16px;font-size:14px;font-weight:600;color:#111827;white-space:nowrap;transition:opacity .1s';
    ghost.textContent='⠿ '+(card.querySelector('.cat-hd-name')?card.querySelector('.cat-hd-name').textContent.trim():'카테고리');
    document.body.appendChild(ghost);
    function onMove(mv){
      if(!moved){if(Math.abs(mv.clientY-startY)<6)return;moved=true;ghost.style.opacity='.88';card.style.opacity='0.4';}
      ghost.style.left=(mv.clientX+14)+'px';ghost.style.top=(mv.clientY-16)+'px';
      var cards=Array.from(listEl.querySelectorAll('.cat-card'));
      var best=null,bestDist=99999,bestTop=true;
      cards.forEach(function(c){if(c===card)return;var r=c.getBoundingClientRect();var mid=r.top+r.height/2;var dist=Math.abs(mv.clientY-mid);if(dist<bestDist){bestDist=dist;best=c;bestTop=mv.clientY<mid;}});
      bestCard=best;bestIsTop=bestTop;
      if(best){var r=best.getBoundingClientRect();line.style.display='block';line.style.top=(bestTop?r.top-2:r.bottom-1)+'px';line.style.left=r.left+'px';line.style.width=r.width+'px';}
      else line.style.display='none';
    }
    function onUp(){
      document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);
      var targetCard=bestCard,isTop=bestIsTop;
      ghost.remove();line.remove();card.style.opacity='';
      if(!moved||!targetCard)return;
      var toId=targetCard.dataset.catid;if(!toId||toId===fromId)return;
      var arr=S.categories.slice().sort(function(a,b){return(a.order||0)-(b.order||0);});
      var fi=arr.findIndex(function(c){return c.id===fromId;});
      var ti=arr.findIndex(function(c){return c.id===toId;});
      if(fi<0||ti<0)return;
      var item=arr.splice(fi,1)[0];
      var insertAt=isTop?ti:ti+1;if(fi<ti)insertAt=Math.max(0,insertAt-1);
      arr.splice(insertAt,0,item);
      arr.forEach(function(c,i){c.order=i;});
      S.categories=arr;save();rPostsFiltered('guide');
    }
    document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
  });
}

/* ── 순서 변경: 카테고리 ── */
function moveCat(catId, dir){
  const arr=[...S.categories].sort((a,b)=>(a.order??0)-(b.order??0));
  const idx=arr.findIndex(c=>c.id===catId);
  const swapIdx=idx+dir;
  if(swapIdx<0||swapIdx>=arr.length)return;
  const tmp=arr[idx].order??idx;
  arr[idx].order=arr[swapIdx].order??swapIdx;
  arr[swapIdx].order=tmp;
  S.categories=arr;
  save();rPostsFiltered('guide');
}

/* ── 순서 변경: 서브카테고리 ── */
function moveSub(catKey, subName, dir){
  if(!S.subcategories)S.subcategories={};
  if(!S.subcategories[catKey]){
    const existing=[...new Set(S.posts.filter(p=>p.category===catKey&&p.subCat).map(p=>p.subCat))];
    S.subcategories[catKey]=existing;
  }
  const arr=S.subcategories[catKey];
  const idx=arr.indexOf(subName);
  if(idx<0)return;
  const swapIdx=idx+dir;
  if(swapIdx<0||swapIdx>=arr.length)return;
  [arr[idx],arr[swapIdx]]=[arr[swapIdx],arr[idx]];
  save();rPostsFiltered('guide');
}

/* ── 순서 변경: 게시글 ── */
function movePost(postId, catKey, subName, dir){
  if(!S.postOrder)S.postOrder={};
  const orderKey=catKey+'__'+subName;
  const subPosts=S.posts.filter(p=>p.category===catKey&&(p.subCat||'기타')===subName);
  const order=S.postOrder[orderKey]||subPosts.map(p=>p.id);
  subPosts.forEach(p=>{if(!order.includes(p.id))order.push(p.id);});
  const idx=order.indexOf(postId);
  if(idx<0)return;
  const swapIdx=idx+dir;
  if(swapIdx<0||swapIdx>=order.length)return;
  [order[idx],order[swapIdx]]=[order[swapIdx],order[idx]];
  S.postOrder[orderKey]=order;
  save();rPostsFiltered('guide');
}

}
function saveCatInline(id){
  const d={id:id||'gc'+Date.now(),emoji:document.getElementById('cE').value.trim(),name:document.getElementById('cN').value.trim(),desc:document.getElementById('cD').value.trim(),cv:id?S.categories.find(x=>x.id===id)?.cv||'cv-bl':'cv-bl',order:parseInt(document.getElementById('cO').value)||S.categories.length};
  if(!d.name){toast('이름을 입력하세요');return;}

function deleteCatInline(id){
  if(!confirm('카테고리를 삭제하면 해당 카테고리의 게시글이 미분류됩니다. 계속하시겠습니까?'))return;
  S.categories=S.categories.filter(x=>x.id!==id);
  save();closeModal();rPostsFiltered('guide');toast('삭제됨');
}

function addSubInline(catKey){
  openModal('소분류 카테고리 추가',
    `<div class="field"><label class="fl">카테고리명</label><input class="fi" id="newSubName" placeholder="예: 매치 시작하기" autofocus></div>`,
    [{l:'취소',c:'btn-gh',f:'closeModal()'},
     {l:'추가',c:'btn-bl',f:`confirmAddSub('${catKey}')`}]);
  setTimeout(()=>document.getElementById('newSubName')?.focus(),80);

function confirmAddSub(catKey){
  const name=(document.getElementById('newSubName')?.value||'').trim();
  if(!name){toast('이름을 입력하세요');return;}
  if(!S.subcategories)S.subcategories={};
  if(!S.subcategories[catKey])S.subcategories[catKey]=[];
  if(S.subcategories[catKey].includes(name)){toast('이미 존재합니다');return;}
  S.subcategories[catKey].push(name);
  save();closeModal();rPostsFiltered('guide');toast('✓ 카테고리 추가됨');
}

/* ── 서브카테고리 삭제 ── */
function deleteSub(catKey, subName){
  const cnt=S.posts.filter(p=>p.category===catKey&&(p.subCat||'기타')===subName).length;
  if(!confirm(`'${subName}'을 삭제하시겠습니까?${cnt?`\n(게시글 ${cnt}개는 '기타'로 이동됩니다.)`:''}`)  )return;
  if(S.subcategories&&S.subcategories[catKey])S.subcategories[catKey]=S.subcategories[catKey].filter(s=>s!==subName);
  S.posts.forEach(p=>{if(p.category===catKey&&p.subCat===subName)p.subCat='기타';});
  save();rPostsFiltered('guide');toast('삭제됨');
}

      peTitle.parentElement.insertBefore(hint, peTitle);
    }

    const catSel=document.getElementById('peCat');
    if(catSel&&catKey){catSel.value=catKey;catSel.dispatchEvent(new Event('change'));}
    setTimeout(()=>{
      const subSel=document.getElementById('peSubCat');

        for(let i=0;i<subSel.options.length;i++){
          if(subSel.options[i].value===subName){subSel.selectedIndex=i;break;}
        }
      }
    },100);
  },120);
}

function openCatModal(id){const c=id?S.categories.find(x=>x.id===id):null;openModal(c?'카드 편집':'카드 추가',catForm(c),[{l:'취소',c:'btn-gh',f:'closeModal()'},{l:'저장',c:'btn-bl',f:`saveCat('${id||''}')`}]);}
function editCat(id){openCatModal(id);}
function onCatHeroImgSelect(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=(ev)=>{
    const data=ev.target.result;
    document.getElementById('cHeroImg').value=data;
    const prev=document.getElementById('catHeroPreview');
    if(prev){
      prev.style.background=`url(${data}) center/cover no-repeat`;
      prev.innerHTML='';
    }
  };
  r.readAsDataURL(f);
}
async function clearCatHeroImg(){
  document.getElementById('cHeroImg').value='';
  const prev=document.getElementById('catHeroPreview');
  if(prev){
    prev.style.background='linear-gradient(135deg,#1a1a2e,#16213e)';
    prev.innerHTML='<span style="color:rgba(255,255,255,.5);font-size:12px">미리보기</span>';
  }
}
async function saveCat(id){
  const heroImgRaw=document.getElementById('cHeroImg')?.value||'';
  const heroImg=heroImgRaw.startsWith('data:')?await uploadImg(heroImgRaw,'categories'):heroImgRaw;
  const d={
    id:id||'gc'+Date.now(),
    emoji:document.getElementById('cE').value.trim(),
    name:document.getElementById('cN').value.trim(),
    desc:document.getElementById('cD').value.trim(),
    cv:id?S.categories.find(x=>x.id===id)?.cv||'cv-bl':'cv-bl',
    order:parseInt(document.getElementById('cO').value)||0,
    heroImage:heroImg||undefined
  };
  if(!d.name){toast('이름 입력');return;}
  if(id){const i=S.categories.findIndex(x=>x.id===id);if(i>=0)S.categories[i]=d;}
  else S.categories.push(d);
  await save();closeModal();rGuide();toast('✓ 저장됨');
}
function delCat(id){if(!confirm('삭제?'))return;S.categories=S.categories.filter(x=>x.id!==id);save();rGuide();toast('삭제됨');}

/* ── 에디터 내부 배경색 정리 ── */
function _cleanEditorBg(container){
  if(!container)return;
  /* 직접 자식 중 배경이 있는 div/section 정리 */
  container.querySelectorAll('div,section,article,main,header,footer,aside,nav').forEach(function(el){
    if(!el.style)return;
    /* 콜아웃, 이미지카드, 동영상 등은 보존 */
    if(el.classList.contains('callout')||el.classList.contains('img-link-card')||
       el.classList.contains('img-link-card-body')||el.classList.contains('rte-video-wrap')||
       el.getAttribute('data-callout')) return;
    /* 배경 관련 스타일 제거 */
    var bg=el.style.background||el.style.backgroundColor||'';
    if(bg&&bg!=='transparent'){
      el.style.removeProperty('background');
      el.style.removeProperty('background-color');
    }
    /* 빈 style 속성 제거 */
    if(el.hasAttribute('style')&&!el.getAttribute('style').trim()){
      el.removeAttribute('style');
    }
  });
}

/* ── 배경색 수동 초기화 버튼 ── */
function rteStripBg(){
  var rb=document.getElementById('rteBody');
  if(!rb)return;
  _cleanEditorBg(rb);
  /* 추가: span 등의 배경도 제거 */

/* ── 전체화면 에디터 ── */
let _isFullscreen=false;
function toggleEditorFullscreen(){
  const wrap=document.getElementById('rteBody')?.closest('.rte-wrap');
  const editorArea=document.getElementById('mainBody');
  const btn=document.getElementById('btnFullscreen');
  if(!wrap)return;
  _isFullscreen=!_isFullscreen;
  if(_isFullscreen){
    // 전체화면 컨테이너 생성
    const fs=document.createElement('div');
    fs.id='editorFS';
    fs.className='editor-fullscreen';
    // 헤더 (제목 + 닫기)
    const titleVal=document.getElementById('peTitle')?.value||'';
    fs.innerHTML=`<div class="editor-fullscreen-hd">
      <input id="fsTitleInp" value="${titleVal}" placeholder="제목 입력..." oninput="syncFsTitle(this.value)">
      <button class="btn btn-gh bxs" onclick="toggleEditorFullscreen()">✕ 전체화면 종료</button>
      <button class="btn btn-bl bxs" onclick="this.textContent='저장 중…';this.disabled=true;savePost().then(()=>toggleEditorFullscreen()).finally(()=>{this.textContent='💾 저장';this.disabled=false;})">💾 저장</button>
    </div>`;
    // 기존 rte-wrap 이동
    fs.appendChild(wrap.cloneNode(true));
    document.body.appendChild(fs);
    // 복제된 에디터에 내용 채우기
    const fsBody=fs.querySelector('.rte-body');
    if(fsBody){
      fsBody.id='rteBodyFS';
      const orig=document.getElementById('rteBody');
      fsBody.innerHTML=orig?orig.innerHTML:'';
      fsBody.contentEditable='true';
      fsBody.setAttribute('onkeydown','rteKeyDown(event)');
      fsBody.setAttribute('onmouseup','saveRange()');
      fsBody.setAttribute('onkeyup','saveRange()');
      // 툴바 버튼들이 rteBody를 참조하므로 id 교체
      fsBody.id='rteBody'; // 오버라이드
      setTimeout(()=>fsBody.focus(),50);
    }
    if(btn)btn.textContent='✕ 전체화면 종료';
  } else {
    const fs=document.getElementById('editorFS');
    if(fs){
      // 내용 원복
      const fsBody=fs.querySelector('#rteBody');
      const orig=document.getElementById('rteBody');
      if(fsBody&&orig&&orig!==fsBody) orig.innerHTML=fsBody.innerHTML;
      // 제목 원복
      const fsTi=document.getElementById('fsTitleInp');
      const origTi=document.getElementById('peTitle');
      if(fsTi&&origTi) origTi.value=fsTi.value;
      fs.remove();
    }
    if(btn)btn.textContent='⛶ 전체화면';
  }
}

function _ilcInsert(){
  const title=document.getElementById('_ilcTitle')?.value||'';
  const desc=document.getElementById('_ilcDesc')?.value||'';
  const imgSrc=window._ilcImgSrc||'';
  if(!title){toast('⚠️ 제목을 입력하세요');return;}

  let href='#', dataAttr='', urlDisplay='';
  if(window._ilcMode==='internal'){
    const postId=document.getElementById('_ilcPostId')?.value;
    if(!postId){toast('⚠️ 게시글을 선택하세요');return;}
    href='#post:'+postId;
    dataAttr=' data-post-id="'+postId+'"';
    const post=S.posts.find(p=>p.id===postId);
    urlDisplay=post?post.title:'내부 게시글';
    /* 하위 글로 설정 */
    const setChild=document.getElementById('_ilcSetChild')?.checked;
    if(setChild && _editId && post && post.id!==_editId){
      post.parentId=_editId;

  }else{
    const url=document.getElementById('_ilcUrl')?.value||'';

  }
  const imgHtml=imgSrc?'<img class="img-link-card-img" src="'+imgSrc+'" alt="">':'';
  const descHtml=desc?'<div class="img-link-card-desc">'+desc+'</div>':'';
  const target=window._ilcMode==='external'?' target="_blank" rel="noopener"':'';
  const html='<a class="img-link-card" href="'+href+'"'+dataAttr+target+' contenteditable="false">'+imgHtml+'<div class="img-link-card-body"><div class="img-link-card-title">'+title+'</div>'+descHtml+'<div class="img-link-card-url">'+urlDisplay+'</div></div></a><p><br></p>';
  document.querySelector('div[style*="fixed"][style*="rgba"]')?.remove();

  restoreRange();
  document.execCommand('insertHTML',false,html);
  saveRange();
}

/* ── 표 우클릭 컨텍스트 메뉴 ── */
var _tblCtxTarget=null;
function _initTblCtx(){
  const ed=document.getElementById('rteBody');
  if(!ed||ed._tblCtxBound)return;
  ed._tblCtxBound=true;
  /* 표 우클릭 메뉴 */
  ed.addEventListener('contextmenu',function(e){
    const cell=e.target.closest('td,th');if(!cell)return;
    const tbl=cell.closest('table');if(!tbl)return;
    e.preventDefault();_tblCtxTarget={cell,tbl};_showTblCtx(e.clientX,e.clientY);
  });
  /* 콜아웃 🎨 버튼 클릭 — 이벤트 위임 (contenteditable 안에서 onclick 미동작 방지) */
  ed.addEventListener('mousedown',function(e){
    const btn=e.target.closest('.callout-color-btn');

    const callout=btn.closest('.callout');
    if(callout) setTimeout(function(){pickCalloutColor(callout);},10);
  });
  ed.addEventListener('click',function(e){
    if(e.target.closest('.callout-color-btn')||e.target.closest('.callout-icon')){e.preventDefault();e.stopPropagation();}
  });
  /* 콜아웃 이모지 클릭 — 이벤트 위임 */
  ed.addEventListener('mousedown',function(e){
    const icon=e.target.closest('.callout-icon');
    if(!icon)return;
    e.preventDefault();e.stopPropagation();
    setTimeout(function(){pickCalloutEmoji(icon);},10);
  });
  document.addEventListener('click',function(e){
    const m=document.getElementById('_tblCtxMenu');if(m&&!m.contains(e.target))m.remove();

function rteInlineCode(){
  var body = document.getElementById('rteBody');
  if(!body) return;
  body.focus();
  restoreRange();
  var sel = window.getSelection();
  if(!sel || !sel.rangeCount) return;
  var range = sel.getRangeAt(0);
  var selected = range.toString();

  if(selected.length > 0){
    // 선택 텍스트를 <code>로 감싸기
    // 이미 code 안이면 unwrap
    var parent = range.startContainer.parentElement;
    if(parent && parent.tagName === 'CODE'){
      // unwrap
      var text = document.createTextNode(parent.textContent);
      parent.parentNode.replaceChild(text, parent);
    } else {
      document.execCommand('insertHTML', false,
        '<code>' + selected.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</code>');
    }
  } else {
    // 커서만 있을 때: <code>|</code> 삽입 후 커서 안에 위치
    document.execCommand('insertHTML', false, '<code>\u200B</code>');
    // 커서를 code 안으로
    var codes = body.querySelectorAll('code');
    var last = codes[codes.length-1];
    if(last){
      var r = document.createRange();
      r.setStart(last, 0); r.collapse(true);
      sel.removeAllRanges(); sel.addRange(r);
    }
  }
  saveRange();
}

function rteKeyDown(e){
  // 백틱 = 인라인 코드
  if(e.key==='`'){
    e.preventDefault();
    rteInlineCode();
    return;
  }
  if(e.key==='Tab'){
    e.preventDefault();
    const sel=window.getSelection();
    if(!sel.rangeCount)return;
    const node=sel.anchorNode;
    const li=node?.nodeType===3?node.parentElement?.closest('li'):node?.closest?.('li');
    if(li){
      // 리스트 항목: 들여쓰기/내어쓰기
      if(e.shiftKey){document.execCommand('outdent',false);}
      else{document.execCommand('indent',false);}
    }else{
      // 일반 텍스트: 스페이스 삽입
      if(!e.shiftKey)document.execCommand('insertHTML',false,'&nbsp;&nbsp;&nbsp;&nbsp;');
    }
    return;
  }
  if(e.key==='Enter'&&!e.shiftKey){
    // 빈 li에서 Enter → 리스트 종료 처리는 브라우저 기본 동작 사용
    return;
  }
}

  if(li) document.execCommand('indent',false);
  else document.execCommand('insertHTML',false,'&nbsp;&nbsp;&nbsp;&nbsp;');
  saveRange();
}

}

/* ── 표 정규화: 외부 붙여넣기 표를 에디터 형식으로 변환 ── */
function _normalizeTable(tbl){
  /* 기본 스타일 */
  tbl.removeAttribute('class');
  tbl.removeAttribute('data-block-id');
  tbl.removeAttribute('data-pm-slice');
  tbl.style.cssText='border-collapse:collapse;width:100%;margin:10px 0;table-layout:fixed';
  /* colgroup 제거 후 재생성 */
  tbl.querySelectorAll('colgroup').forEach(function(cg){cg.remove();});
  /* caption, thead→tbody 정리 */
  tbl.querySelectorAll('caption').forEach(function(c){c.remove();});
  /* 첫 행에서 열 수 파악 */
  var firstRow=tbl.rows[0];
  if(!firstRow)return;
  var n=firstRow.cells.length;
  if(!n)return;
  /* colgroup 생성 */
  var newCg=document.createElement('colgroup');
  var pct=Math.round(100/n);
  for(var i=0;i<n;i++){
    var col=document.createElement('col');
    col.style.width=pct+'%';
    newCg.appendChild(col);
  }
  tbl.insertBefore(newCg,tbl.firstChild);

  /* 전체 행 순회: 첫 행이 TH이면 헤더로 간주 */
  var hasHeader=firstRow.cells[0]&&firstRow.cells[0].tagName==='TH';

  /* 셀 정규화 */
  Array.from(tbl.querySelectorAll('td,th')).forEach(function(cell){
    var isHeader=cell.tagName==='TH';
    /* 텍스트 정렬만 보존 */
    var origAlign=cell.style.textAlign||cell.getAttribute('align')||'left';
    /* 모든 속성 제거 */
    cell.removeAttribute('class');
    cell.removeAttribute('width');
    cell.removeAttribute('height');
    cell.removeAttribute('align');
    cell.removeAttribute('valign');
    cell.removeAttribute('data-cell-id');
    cell.removeAttribute('data-colwidth');
    cell.removeAttribute('colspan');
    cell.removeAttribute('rowspan');
    cell.contentEditable='true';
    /* 에디터 기본 스타일 적용 (색상 제거) */
    cell.style.cssText='border:1px solid var(--abdr);padding:8px 10px;font-size:13px;min-width:60px;text-align:'+origAlign+';vertical-align:top';
    if(isHeader) cell.style.fontWeight='600';

    /* 셀 내부 span/strong/em 등의 인라인 스타일 정리 */
    cell.querySelectorAll('span,font,b,strong,em,i,u,a').forEach(function(el){
      /* color, background 등 노션 고유 스타일 제거 */
      if(el.style){
        el.style.removeProperty('color');
        el.style.removeProperty('background');
        el.style.removeProperty('background-color');
        el.style.removeProperty('font-family');
        el.style.removeProperty('font-size');
        el.style.removeProperty('line-height');
        el.style.removeProperty('letter-spacing');
        el.style.removeProperty('white-space');
        el.style.removeProperty('-webkit-text-stroke-width');
        /* 스타일이 비어있으면 속성 자체 제거 */
        if(!el.getAttribute('style')?.trim()) el.removeAttribute('style');
      }
      /* <font> 태그를 텍스트로 교체 */
      if(el.tagName==='FONT'){
        var sp=document.createElement('span');
        sp.innerHTML=el.innerHTML;
        el.replaceWith(sp);
      }
    });
    /* 불필요한 빈 <p>, <div> 정리 */
    cell.querySelectorAll('p,div').forEach(function(block){
      if(block.style){
        block.style.removeProperty('color');
        block.style.removeProperty('background');
        block.style.removeProperty('background-color');
        block.style.removeProperty('font-family');
        block.style.removeProperty('font-size');
        block.style.removeProperty('line-height');
        block.style.removeProperty('padding');
        block.style.removeProperty('margin');
        if(!block.getAttribute('style')?.trim()) block.removeAttribute('style');
      }
      block.removeAttribute('class');
      block.removeAttribute('data-block-id');
    });
  });

  /* 불필요한 속성 제거 */
  tbl.removeAttribute('cellpadding');
  tbl.removeAttribute('cellspacing');
  tbl.removeAttribute('border');
  /* tbody 확인 */
  if(!tbl.querySelector('tbody')){
    var tbody=document.createElement('tbody');
    while(tbl.rows.length){tbody.appendChild(tbl.rows[0]);}
    var cg2=tbl.querySelector('colgroup');
    if(cg2) cg2.after(tbody);
    else tbl.appendChild(tbody);
  }
}

let _colorMode='fore';
function openColorPopup(mode,btn){
  _colorMode=mode;

  const lbl=document.getElementById('cpLabel');
  if(lbl) lbl.textContent=mode==='fore'?'글자 색 선택':'배경 색 선택';
  const opRow=document.getElementById('cpOpacityRow');
  if(opRow) opRow.style.display=mode==='back'?'flex':'none';
  const clrRow=document.getElementById('cpClearRow');
  if(clrRow) clrRow.style.display=mode==='back'?'block':'none';
  const rect=btn.getBoundingClientRect();
  popup.style.top=(rect.bottom+6)+'px';
  const pw=224;
  popup.style.left=Math.min(rect.left, window.innerWidth-pw-8)+'px';

  setTimeout(()=>document.addEventListener('click',()=>popup.classList.remove('open'),{once:true}),50);

function applyColor(c){
  document.getElementById('rteBody').focus();
  restoreRange();
  if(_colorMode==='fore'){
    document.execCommand('foreColor',false,c);
    document.getElementById('colorBar').style.background=c;
  } else {
    /* 배경색 + 투명도 */
    const opSlider=document.getElementById('cpOpacity');
    const opacity=opSlider?parseInt(opSlider.value)/100:1;
    if(opacity<1){
      /* hex→rgba 변환 */
      const hex=c.replace('#','');
      const r=parseInt(hex.substring(0,2),16)||0;
      const g=parseInt(hex.substring(2,4),16)||0;
      const b=parseInt(hex.substring(4,6),16)||0;
      const rgba='rgba('+r+','+g+','+b+','+opacity.toFixed(2)+')';
      /* hiliteColor는 rgba 미지원 → span style로 직접 적용 */
      const sel=window.getSelection();
      if(sel.rangeCount){
        const range=sel.getRangeAt(0);
        const span=document.createElement('span');
        span.style.backgroundColor=rgba;
        range.surroundContents(span);
      }
    } else {
      document.execCommand('hiliteColor',false,c);
    }
  }
  saveRange();
}
function clearBgColor(){
  document.getElementById('rteBody').focus();
  restoreRange();
  document.execCommand('hiliteColor',false,'transparent');

// 이전 initTableResize 컨트롤러 보관
var _rszAbort = null;

function initTableResize(){
  _initTblCtx();
  _patchCalloutColorBtns();
  // 이전 리스너 완전 제거
  if(_rszAbort){ _rszAbort.abort(); _rszAbort = null; }
  clearRH();

  var ed = document.getElementById('rteBody');
  if(!ed) return;

  _rszAbort = new AbortController();
  var sig = {signal: _rszAbort.signal};
  var activeTbl = null;

  ed.addEventListener('mousemove', function(e){
    if(window._rhActive) return;
    var tbl = e.target.closest('table');
    if(tbl === activeTbl) return;
    clearRH();
    activeTbl = tbl;
    if(tbl) makeRH(tbl);
  }, sig);

  // 표 밖으로 나갈 때: _rh 위로 이동하는 경우는 유지
  document.addEventListener('mousemove', function(e){
    if(window._rhActive) return;
    var onRH = e.target.classList && e.target.classList.contains('_rh');
    var inEd = ed.contains(e.target);
    if(!onRH && !inEd){
      clearRH();
      activeTbl = null;
    }
  }, sig);
}

function clearRH(){
  document.querySelectorAll('._rh').forEach(function(n){ n.remove(); });
}

function makeRH(tbl){
  clearRH();
  if(!tbl || !document.contains(tbl)) return;
  tbl.style.tableLayout = 'fixed';
  if(!tbl.style.width || tbl.style.width === '100%')
    tbl.style.width = tbl.offsetWidth + 'px';

  /* col 요소 폭을 실제 렌더링 px로 변환 (% → px) */
  var firstRow = tbl.rows[0];
  var cols = tbl.querySelectorAll('colgroup col');
  if(firstRow && cols.length){
    for(var ci=0; ci<cols.length; ci++){
      var cell = firstRow.cells[ci];
      if(cell) cols[ci].style.width = cell.offsetWidth + 'px';
    }
  }

  var n = firstRow ? firstRow.cells.length : 0;
  if(!n) return;

  for(var i=0; i<n; i++){
    (function(ci){
      var isLast = (ci === n-1);
      var h = document.createElement('div');
      h.className = '_rh';
      h.style.cssText = 'position:fixed;width:7px;cursor:col-resize;z-index:9999;border-radius:3px;background:transparent;';
      document.body.appendChild(h);

      function pos(){
        if(!document.contains(tbl)){ h.remove(); return; }
        var cell = tbl.rows[0] && tbl.rows[0].cells[ci];
        if(!cell){ h.remove(); return; }
        var cr = cell.getBoundingClientRect();
        var tr = tbl.getBoundingClientRect();
        h.style.left   = (cr.right - 3.5) + 'px';
        h.style.top    = tr.top + 'px';
        h.style.height = tr.height + 'px';
      }
      pos();
      h._pos = pos;

      h.addEventListener('mouseenter', function(){ h.style.background='rgba(59,130,246,.45)'; pos(); });
      h.addEventListener('mouseleave', function(){ if(!window._rhActive) h.style.background='transparent'; });

      h.addEventListener('mousedown', function(e){
        e.preventDefault(); e.stopPropagation();
        window._rhActive = true;
        h.style.background='rgba(59,130,246,.85)';

        // 전체화면 커서 오버레이
        var ov = document.createElement('div');
        ov.style.cssText = 'position:fixed;inset:0;z-index:9998;cursor:col-resize;';
        document.body.appendChild(ov);

        var sx = e.clientX;
        var firstRow = tbl.rows[0];
        var cellL = firstRow ? firstRow.cells[ci] : null;
        var cellR = firstRow ? firstRow.cells[ci+1] : null;
        var startL = cellL ? cellL.offsetWidth : 80;
        var startR = cellR ? cellR.offsetWidth : 80;
        var snapW = tbl.offsetWidth;

        /* colgroup/col 요소 찾기 */
        var cols = tbl.querySelectorAll('colgroup col');
        var colL = cols[ci] || null;
        var colR = cols[ci+1] || null;

        function mv(e){
          var dx = e.clientX - sx;
          if(isLast){
            var newW = Math.max(100, snapW + dx);
            tbl.style.width = newW + 'px';
            var newL = Math.max(40, startL + dx);
            if(colL) colL.style.width = newL + 'px';
            if(cellL) cellL.style.width = newL + 'px';
          } else {
            var newL = Math.max(40, startL + dx);
            var newR = Math.max(40, startR - dx);
            if(colL) colL.style.width = newL + 'px';
            if(colR) colR.style.width = newR + 'px';
            if(cellL) cellL.style.width = newL + 'px';
            if(cellR) cellR.style.width = newR + 'px';
          }
          pos();
        }
        function up(){
          document.removeEventListener('mousemove',mv);
          document.removeEventListener('mouseup',up);
          ov.remove();
          window._rhActive=false;
          h.style.background='rgba(59,130,246,.4)';
          document.querySelectorAll('._rh').forEach(function(rh){ if(rh._pos)rh._pos(); });
        }
        document.addEventListener('mousemove',mv);
        document.addEventListener('mouseup',up);
      });
    })(i);
  }
}

async function savePost(){
  const title=document.getElementById('peTitle')?.value.trim();
  if(!title){toast('⚠️ 제목을 입력하세요');return;}
  try{
    const rawContent=document.getElementById('rteBody')?.innerHTML||'';
    const hasBase64=/src="data:(image|video)\//.test(rawContent);
    let content=rawContent;
    if(hasBase64){
      toast('미디어 업로드 중… (최대 20초)');
      try{
        content=await uploadRteImages(rawContent);
        if(/src="data:/.test(content)){
          // base64 이미지가 아직 남아있음 = Storage 업로드 실패
          const stats=window._imgUploadStats||{};
          const reason=window._pendingImgFailReason||'이미지를 Firebase Storage에 업로드하지 못했습니다.';
          window._pendingImgFailReason='';
          window._imgUploadStats=null;
          const failCount=stats.fail||0;
          showImgFailPopup(failCount, reason);
          // 텍스트는 저장되었으나 이미지는 base64로 남음 (Firestore 용량 주의)
        }
      }catch(e){
        console.error('이미지 처리 오류',e);
        content=rawContent.replace(/src="data:image[^"]*"/g,'src="" data-removed="1"').replace(/src="data:video[^"]*"/g,'src="" data-removed="1"');
        toast('⚠️ 이미지 처리 오류');
      }
    }
    const existing=_editId?S.posts.find(x=>x.id===_editId):null;
    const d={
      id:_editId||'p'+Date.now(),
      title,
      postType:_curPostType==='service'?'service':'guide',
      category:_curPostType!=='service'?(document.getElementById('peCat')?.value||'gc1'):'',
      serviceId:_curPostType==='service'?(document.getElementById('peSvc')?.value||''):'',
      subCat:(document.getElementById('peSubCat')?.value||'').trim(),
      emoji:existing?.emoji||'📄',
      excerpt:document.getElementById('peExcerpt')?.value.trim()||'',
      author:document.getElementById('peAuthor')?.value.trim()||'플랩팀',
      status:document.getElementById('peStat')?.value||'published',
      content,
      relatedPosts:_relIds.length?[..._relIds]:undefined,
      subCnt:3,
      date:existing?.date||new Date().toISOString(),
      updatedAt:new Date().toISOString(),
      views:existing?.views||0,
      parentId:existing?.parentId||_pendingParentId||undefined,
    };
    _pendingParentId=null;
    if(_editId){const i=S.posts.findIndex(x=>x.id===_editId);if(i>=0)S.posts[i]=d;else S.posts.push(d);}
    else S.posts.push(d);
    if(d.serviceId&&d.id.startsWith('sp-')){
      if(!S.servicePages)S.servicePages={};
      S.servicePages[d.serviceId]=content;
    }
    await save();
    _editorDirty=false;
    const label=_curPostType==='service'?'서비스 게시글':'가이드 게시글';
    saveConfirm(`${label}이 저장됐습니다`,()=>{
      if(_curPostType==='service') rPostsFiltered('service');
      else rPostsFiltered('guide');
    });
  }catch(e){
    console.error('savePost 오류',e);
    toast('❌ 저장 오류: '+e.message);
  }
}

let _ftLinkCount = 0;
function addFtLink(){
  const wrap=document.getElementById('ftLinksWrap');if(!wrap)return;
  const i=wrap.children.length;
  const div=document.createElement('div');
  div.style.cssText='display:flex;gap:8px;margin-bottom:8px';
  div.id='ftl_'+i;
  div.innerHTML=`<input class="fi" id="ftLabel_${i}" placeholder="링크명" style="flex:1"><input class="fi" id="ftUrl_${i}" placeholder="URL" style="flex:2"><button class="btn btn-rd bxs" onclick="rmFtLink(${i})">✕</button>`;
  wrap.appendChild(div);
}
function rmFtLink(i){const el=document.getElementById('ftl_'+i);if(el)el.remove();}
function saveFooter(){
  if(!S.settings.footer) S.settings.footer={};
  // 링크 수집
  const links=[];
  document.querySelectorAll('[id^="ftLabel_"]').forEach(el=>{
    const i=el.id.replace('ftLabel_','');
    const url=document.getElementById('ftUrl_'+i);
    if(el.value.trim()) links.push({label:el.value.trim(),url:url?.value.trim()||'#'});
  });
  S.settings.footer.links=links;
  S.settings.footer.biz=document.getElementById('ftBiz')?.value||'';
  S.settings.footer.contact=document.getElementById('ftContact')?.value||'';
  S.settings.footer.instagram=document.getElementById('ftIg')?.value||'';
  S.settings.footer.youtube=document.getElementById('ftYt')?.value||'';
  S.settings.footer.appstore=document.getElementById('ftApp')?.value||'';
  S.settings.footer.copyright=document.getElementById('ftCopy')?.value||'';
  save();saveConfirm('푸터가 저장됐습니다');
}

function saveSets(){
  S.settings.siteName=document.getElementById('sSite')?.value.trim()||'';
  S.settings.adminEmail=document.getElementById('sEm')?.value.trim()||'';
  const pw=document.getElementById('sPw')?.value;if(pw)S.settings.adminPw=pw;
  S.settings.ogTitle=document.getElementById('sOgTitle')?.value.trim()||'';
  S.settings.ogDesc=document.getElementById('sOgDesc')?.value.trim()||'';
  save();saveConfirm('설정이 저장됐습니다');
}

async function uploadOgImg(input){
  const file=input.files[0]; if(!file) return;
  const toastId=toast('이미지 업로드 중…');
  try{
    const {ref,uploadBytes,getDownloadURL,getStorage}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js');
    const storage=getStorage();
    const r=ref(storage,'settings/ogImage_'+Date.now());
    await uploadBytes(r,file);
    const url=await getDownloadURL(r);
    S.settings.ogImage=url;
    document.getElementById('ogImgPreview').innerHTML=`<img src="${url}" style="width:100%;height:100%;object-fit:cover;border-radius:6px">`;
    save(); toast('✅ OG 이미지 업로드 완료');
  }catch(e){ toast('⚠️ 업로드 실패: '+e.message); }
}

function clearOgImg(){
  S.settings.ogImage='';
  document.getElementById('ogImgPreview').innerHTML='<span style="font-size:11px;color:var(--am);text-align:center">이미지 없음</span>';
  save();rSettings();
}
function exportData(){const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='plab-cms.json';a.click();}
function resetData(){if(!confirm('초기화하시겠습니까?'))return;S=JSON.parse(JSON.stringify(DEF));save();pg('dashboard');toast('초기화됨');}

function openModal(title,body,buttons){

}

function saveConfirm(msg, onConfirm){

}

/* ── HTML 이스케이프 ── */
function x(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
